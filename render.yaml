services:
  - type: web
    name: fieldvoice-backend
    env: node
    rootDir: backend
    buildCommand: "if [ -f package.json ]; then npm install; else npm --prefix backend install; fi"
    startCommand: "if [ -f src/index.js ]; then node src/index.js; else node backend/src/index.js; fi"
    envVars:
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false # Render will prompt you to input this securely on deployment
      - key: GROQ_API_KEY_2
        sync: false # Render will prompt you to input this securely on deployment
      - key: OPENROUTER_API_KEY
        sync: false # Render will prompt you to input this securely on deployment
      - key: PGHOST
        value: aws-1-ap-northeast-1.pooler.supabase.com
      - key: PGPORT
        value: "6543"
      - key: PGUSER
        value: postgres.cljrxacekqznhraudvqo
      - key: PGDATABASE
        value: postgres
      - key: PGPASSWORD
        sync: false # Render will prompt you to input this securely on deployment
      - key: PGSSL
        value: "true"
